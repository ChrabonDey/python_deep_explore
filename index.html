<!DOCTYPE html>
<html>
<body>

<button onclick="test()">Send QUERY</button>

<script>
async function test() {
    const res = await fetch("http://localhost:3000/products", {
        method: "QUERY",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            category: "shoes"
        })
    });

    console.log(await res.json());
}
</script>

</body>
</html>
